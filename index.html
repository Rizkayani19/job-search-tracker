<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Job Search CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #333; --border: #ddd; }
        body.dark-theme { --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; --border: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 20px; transition: 0.3s; padding-bottom: 50px; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 120px; padding: 15px; border-radius: 8px; text-align: center; background: var(--bg); border: 1px solid var(--border); }
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-google { background: #4285F4; color: white; }
        .btn-add { background: #28a745; color: white; width: 100%; margin: 10px 0; }
        .btn-update { background: #007bff; color: white; width: 100%; margin: 10px 0; display: none; }
        .btn-util { background: #6f42c1; color: white; font-size: 0.8em; padding: 8px 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        .action-btns { display: flex; gap: 5px; }
        .delete-btn { background: none; border: none; cursor: pointer; font-size: 1.2em; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; margin-top: 5px; cursor: pointer; }
        @media (max-width: 600px) { th:nth-child(1), td:nth-child(1) { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="btn" onclick="toggleDarkMode()">🌙 Theme</button>
        <div id="authArea">
            <button id="loginBtn" class="btn btn-google" onclick="login()">Login with Google</button>
            <button id="logoutBtn" class="btn" style="display:none; background:#6c757d; color:white;" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <h2 style="text-align:center">Cloud Job CRM</h2>
    <p id="userStatus" style="text-align:center; font-size:0.8em; color:#777;">Please login to sync data.</p>

    <div class="stats-grid">
        <div class="stat-card">Applied <br><strong id="countApplied" style="color:#007bff">0</strong></div>
        <div class="stat-card">Interviews <br><strong id="countInterviewing" style="color:#ffc107">0</strong></div>
        <div class="stat-card">Offers <br><strong id="countOffer" style="color:#28a745">0</strong></div>
        <div class="stat-card">Avg Salary <br><strong id="avgSalary" style="color:#7b1fa2">$0</strong></div>
    </div>

    <div id="mainApp" style="opacity: 0.4; pointer-events: none;">
        <div class="form-section">
            <input type="text" id="company" placeholder="Company">
            <input type="text" id="role" placeholder="Role">
            <input type="date" id="dateApplied">
            <input type="number" id="salary" placeholder="Salary ($)">
            <select id="status">
                <option value="Applied">Applied</option>
                <option value="Interviewing">Interviewing</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
            <div style="grid-column: 1/-1;">
                <label style="font-size: 0.8em; display: block; margin-bottom: 5px;">Upload Resume (PDF/Word):</label>
                <input type="file" id="resumeFile" accept=".pdf,.doc,.docx">
            </div>
            <textarea id="notes" placeholder="Notes & Links (Paste URLs here...)" style="grid-column: 1/-1; height: 80px;"></textarea>
        </div>
        
        <button id="addBtn" class="btn btn-add" onclick="addJob()">Add Job to Cloud</button>
        <button id="updateBtn" class="btn btn-update" onclick="submitUpdate()">Update Job Details</button>
        <button id="cancelBtn" class="btn" style="display:none; width:100%; margin-top:5px;" onclick="resetForm()">Cancel Edit</button>

        <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; align-items: center;">
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="renderUI()" style="flex: 2;">
            <select id="filterStatus" onchange="renderUI()" style="flex: 1;">
                <option value="All">All Statuses</option>
                <option value="Applied">Applied</option>
                <option value="Interviewing">Interviewing</option>
                <option value="Offer">Offer</option>
                <option value="Rejected">Rejected</option>
            </select>
            <button class="btn btn-util" onclick="checkReminders()">🔔 Reminders</button>
            <button class="btn btn-util" style="background:#207245" onclick="exportToCSV()">📊 Export CSV</button>
        </div>

        <table>
            <thead>
                <tr><th>Date</th><th>Company Info</th><th>Role</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="jobList"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

     const firebaseConfig = {
  apiKey: "AIzaSyDnbgO6QIUEDNsM7MSpo3qug8FBNlt5weg",
  authDomain: "job-search-92565.firebaseapp.com",
  databaseURL: "https://job-search-92565-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "job-search-92565",
  storageBucket: "job-search-92565.firebasestorage.app",
  messagingSenderId: "202940543641",
  appId: "1:202940543641:web:7f8802aa7a08704540be08",
  measurementId: "G-676RGLS7TW"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();
    let jobs = [];
    let userUID = null;
    let editingID = null;

    onAuthStateChanged(auth, (user) => {
        const mainApp = document.getElementById('mainApp');
        if (user) {
            userUID = user.uid;
            mainApp.style.opacity = "1";
            mainApp.style.pointerEvents = "auto";
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('userStatus').innerText = "Syncing: " + user.email;
            onValue(ref(db, `users/${userUID}/jobs`), (snapshot) => {
                const data = snapshot.val();
                jobs = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                renderUI();
            });
        } else {
            userUID = null;
            mainApp.style.opacity = "0.4";
            mainApp.style.pointerEvents = "none";
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('userStatus').innerText = "Please login to sync data.";
            jobs = []; renderUI();
        }
    });

    getRedirectResult(auth).catch(e => console.error("Login Error", e));

    window.login = () => signInWithRedirect(auth, provider);
    window.logout = () => signOut(auth);

    window.addJob = () => {
        const company = document.getElementById('company').value;
        const role = document.getElementById('role').value;
        const status = document.getElementById('status').value;
        const date = document.getElementById('dateApplied').value;
        const salary = parseFloat(document.getElementById('salary').value) || 0;
        const notes = document.getElementById('notes').value;
        const fileInput = document.getElementById('resumeFile');
        const lastUpdated = new Date().toLocaleString();

        if (company && role && date) {
            const save = (resumeBase64 = "") => {
                push(ref(db, `users/${userUID}/jobs`), { company, role, status, date, salary, notes, resume: resumeBase64, lastUpdated });
                resetForm();
                if(status === "Offer") triggerConfetti();
            };

            if (fileInput.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (e) => save(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            } else { save(); }
        } else { alert("Fill in Company, Role, and Date!"); }
    };

    window.editJob = (id) => {
        const job = jobs.find(j => j.id === id);
        if (!job) return;
        
        editingID = id;
        document.getElementById('company').value = job.company;
        document.getElementById('role').value = job.role;
        document.getElementById('dateApplied').value = job.date;
        document.getElementById('salary').value = job.salary;
        document.getElementById('status').value = job.status;
        document.getElementById('notes').value = job.notes || "";

        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'block';
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.submitUpdate = () => {
        const company = document.getElementById('company').value;
        const role = document.getElementById('role').value;
        const status = document.getElementById('status').value;
        const date = document.getElementById('dateApplied').value;
        const salary = parseFloat(document.getElementById('salary').value) || 0;
        const notes = document.getElementById('notes').value;
        const fileInput = document.getElementById('resumeFile');
        const lastUpdated = new Date().toLocaleString();

        const updateData = { company, role, status, date, salary, notes, lastUpdated };

        const finalizeUpdate = (resumeBase64 = null) => {
            if (resumeBase64) updateData.resume = resumeBase64;
            update(ref(db, `users/${userUID}/jobs/${editingID}`), updateData);
            resetForm();
            if(status === "Offer") triggerConfetti();
        };

        if (fileInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = (e) => finalizeUpdate(e.target.result);
            reader.readAsDataURL(fileInput.files[0]);
        } else { finalizeUpdate(); }
    };

    window.resetForm = () => {
        editingID = null;
        document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        document.getElementById('addBtn').style.display = 'block';
        document.getElementById('updateBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
    };

    window.updateStatus = (id, newStatus) => {
        update(ref(db, `users/${userUID}/jobs/${id}`), { status: newStatus, lastUpdated: new Date().toLocaleString() });
        if(newStatus === "Offer") triggerConfetti();
    };

    window.deleteJob = (id) => { if(confirm("Delete this job entry?")) remove(ref(db, `users/${userUID}/jobs/${id}`)); };

    window.researchCompany = (name) => {
        const query = encodeURIComponent(name);
        window.open(`https://www.google.com/search?q=${query}+news&tbm=nws`, '_blank');
        window.open(`https://www.linkedin.com/search/results/all/?keywords=${query}`, '_blank');
    };

    window.shareJob = (company, role, notes) => {
        const text = `Job: ${role} at ${company}\nNotes: ${notes}`;
        if (navigator.share) navigator.share({ title: 'Job Details', text: text }).catch(console.error);
        else alert(text);
    };

    window.sendFollowUp = (company, role) => {
        const subject = encodeURIComponent(`Follow-up: ${role} application`);
        const body = encodeURIComponent(`Hi ${company} Team,\n\nI'm following up on my application for ${role}. Looking forward to hearing from you!`);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    };

    window.exportToCSV = () => {
        let csv = "Date,Company,Role,Status,Salary,Notes,LastUpdated\n";
        jobs.forEach(j => csv += `${j.date},${j.company},${j.role},${j.status},${j.salary},"${(j.notes||'').replace(/"/g,'')}",${j.lastUpdated}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'MyJobs.csv'; a.click();
    };

    function triggerConfetti() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }

    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.replace(urlPattern, '<a href="$1" target="_blank" style="color:#007bff">Link 🔗</a>');
    }

    window.renderUI = () => {
        const list = document.getElementById('jobList');
        const search = document.getElementById('searchInput').value.toLowerCase();
        const filter = document.getElementById('filterStatus').value;
        list.innerHTML = '';
        let stats = { Applied: 0, Interviewing: 0, Offer: 0, totalSalary: 0, sCount: 0 };

        jobs.filter(j => {
            const mS = j.company.toLowerCase().includes(search) || j.role.toLowerCase().includes(search);
            const mF = (filter === "All" || j.status === filter);
            return mS && mF;
        }).sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(job => {
            if(stats.hasOwnProperty(job.status)) stats[job.status]++;
            if(job.salary > 0) { stats.totalSalary += job.salary; stats.sCount++; }

            const color = {Applied:'#007bff', Interviewing:'#ffc107', Offer:'#28a745', Rejected:'#dc3545'}[job.status] || '#666';
            const diffDays = Math.floor((new Date() - new Date(job.date)) / 86400000);
            
            let badge = "";
            if (job.status === "Applied") {
                if (diffDays >= 7) badge = `<span class="badge" style="background:#dc3545; color:white;" onclick="sendFollowUp('${job.company}','${job.role}')">⚠️ 7d+ Email</span>`;
                else if (diffDays >= 3) badge = `<span class="badge" style="background:#ffc107;" onclick="sendFollowUp('${job.company}','${job.role}')">⏳ 3d Email</span>`;
            }

            const resumeHtml = job.resume ? `<br><a href="${job.resume}" target="_blank" style="font-size:0.8em; color:#28a745; text-decoration:none;">📄 Resume</a>` : "";

            list.innerHTML += `<tr>
                <td>${job.date}</td>
                <td>
                    <strong>${job.company}</strong> <span onclick="researchCompany('${job.company}')" style="cursor:pointer; font-size:0.8em;">🔍</span>
                    ${resumeHtml} ${badge}
                    <div style="font-size:0.7em; color:#888; margin-top:3px;">Updated: ${job.lastUpdated || 'Initial'}</div>
                    <small>${linkify(job.notes || '')}</small>
                </td>
                <td>${job.role}</td>
                <td>
                    <select onchange="updateStatus('${job.id}', this.value)" style="color:${color}; font-weight:bold; border:none; background:transparent;">
                        <option value="Applied" ${job.status==='Applied'?'selected':''}>Applied</option>
                        <option value="Interviewing" ${job.status==='Interviewing'?'selected':''}>Interviewing</option>
                        <option value="Offer" ${job.status==='Offer'?'selected':''}>Offer</option>
                        <option value="Rejected" ${job.status==='Rejected'?'selected':''}>Rejected</option>
                    </select>
                </td>
                <td class="action-btns">
                    <button class="delete-btn" onclick="editJob('${job.id}')" title="Edit">✏️</button>
                    <button class="delete-btn" onclick="shareJob('${job.company}','${job.role}','${(job.notes||'').substring(0,20)}')">📤</button>
                    <button class="delete-btn" onclick="deleteJob('${job.id}')">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById('countApplied').innerText = stats.Applied;
        document.getElementById('countInterviewing').innerText = stats.Interviewing;
        document.getElementById('countOffer').innerText = stats.Offer;
        document.getElementById('avgSalary').innerText = "$" + (stats.sCount > 0 ? Math.round(stats.totalSalary/stats.sCount).toLocaleString() : 0);
    };

    window.checkReminders = () => {
        const followUps = jobs.filter(j => j.status === "Applied" && (Math.floor((new Date() - new Date(j.date)) / 86400000) >= 7));
        alert(followUps.length > 0 ? `You have ${followUps.length} jobs to follow up on!` : "All caught up!");
    };

    window.toggleDarkMode = () => {
        const isDark = document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
</script>
</body>
</html>
