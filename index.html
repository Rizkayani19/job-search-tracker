<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Strategy Job CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #333; --border: #ddd; --accent: #0077b5; } /* LinkedIn Blue */
        body.dark-theme { --bg: #1a1a1a; --card: #2d2d2d; --text: #eee; --border: #444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 20px; transition: 0.3s; padding-bottom: 50px; }
        .container { max-width: 1200px; margin: auto; background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .stats-grid { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 120px; padding: 15px; border-radius: 8px; text-align: center; background: var(--bg); border: 1px solid var(--border); }
        .form-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--text); width: 100%; box-sizing: border-box; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-google { background: #4285F4; color: white; }
        .btn-add { background: #28a745; color: white; width: 100%; margin: 10px 0; }
        .btn-update { background: var(--accent); color: white; width: 100%; margin: 10px 0; display: none; }
        .btn-util { background: #6f42c1; color: white; font-size: 0.8em; padding: 8px 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85em; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .action-btns { display: flex; gap: 5px; }
        .delete-btn { background: none; border: none; cursor: pointer; font-size: 1.2em; }
        .score-pill { padding: 2px 8px; border-radius: 12px; font-weight: bold; font-size: 0.8em; color: white; }
        .li-badge { background: var(--accent); color: white; padding: 2px 5px; border-radius: 4px; font-size: 0.7em; margin-left: 5px; }
        @media (max-width: 850px) { .hide-mobile { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="btn" onclick="toggleDarkMode()">🌙 Theme</button>
        <div id="authArea">
            <button id="loginBtn" class="btn btn-google" onclick="login()">Login with Google</button>
            <button id="logoutBtn" class="btn" style="display:none; background:#6c757d; color:white;" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <h2 style="text-align:center">AI-Strategy Job Search CRM</h2>
    <p id="userStatus" style="text-align:center; font-size:0.8em; color:#777;">Please login to sync data.</p>

    <div class="stats-grid">
        <div class="stat-card">Applied <br><strong id="countApplied" style="color:#007bff">0</strong></div>
        <div class="stat-card">Interviews <br><strong id="countInterviewing" style="color:#ffc107">0</strong></div>
        <div class="stat-card">Avg Match <br><strong id="avgMatch" style="color:#28a745">0%</strong></div>
        <div class="stat-card">Offers <br><strong id="countOffer" style="color:#7b1fa2">0</strong></div>
    </div>

    <div id="mainApp" style="opacity: 0.4; pointer-events: none;">
        <div class="form-section">
            <input type="text" id="company" placeholder="Company Name">
            <input type="text" id="role" placeholder="Role Title">
            <select id="liMode">
                <option value="Manual">LinkedIn (Manual)</option>
                <option value="Easy">LinkedIn (Easy Apply)</option>
                <option value="Direct">Company Website</option>
            </select>
            <input type="text" id="recruiter" placeholder="Recruiter/Contact Name">
            <div style="display: flex; align-items: center; gap: 10px; background: var(--bg); padding: 5px; border-radius: 6px;">
                <label style="font-size: 0.7em; white-space: nowrap;">AI Match %:</label>
                <input type="range" id="matchScore" min="0" max="100" value="70" oninput="this.nextElementSibling.value = this.value + '%'">
                <output style="font-size: 0.8em; font-weight: bold;">70%</output>
            </div>
            <input type="date" id="dateApplied">
            
            <div style="grid-column: 1/-1; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>
                    <label style="font-size: 0.75em; color: #666;">Interview Date:</label>
                    <input type="datetime-local" id="interviewDate">
                </div>
                <div>
                    <label style="font-size: 0.75em; color: #666;">Resume Version:</label>
                    <input type="file" id="resumeFile" accept=".pdf,.doc,.docx">
                </div>
            </div>
            <textarea id="notes" placeholder="Paste Job Description Link here..." style="height: 50px;"></textarea>
            <textarea id="remarks" placeholder="AI Feedback: Missing keywords? Interview tips?" style="height: 50px;"></textarea>
        </div>
        
        <button id="addBtn" class="btn btn-add" onclick="addJob()">Add Job to Cloud</button>
        <button id="updateBtn" class="btn btn-update" onclick="submitUpdate()">Update Strategy Details</button>
        <button id="cancelBtn" class="btn" style="display:none; width:100%; margin-top:5px;" onclick="resetForm()">Cancel Edit</button>

        <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; align-items: center;">
            <input type="text" id="searchInput" placeholder="Search Role or Recruiter..." onkeyup="renderUI()" style="flex: 2;">
            <select id="filterStatus" onchange="renderUI()" style="flex: 1;">
                <option value="Active">Active Search</option>
                <option value="All">All History</option>
                <option value="Rejected">Rejected/Archived</option>
            </select>
            <button class="btn btn-util" onclick="exportToCSV()">📊 Export for Review</button>
        </div>

        <table>
            <thead>
                <tr><th>Date</th><th>Target</th><th>Role</th><th>Match</th><th>Status</th><th>Next Steps</th><th>Actions</th></tr>
            </thead>
            <tbody id="jobList"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDnbgO6QIUEDNsM7MSpo3qug8FBNlt5weg",
        authDomain: "job-search-92565.firebaseapp.com",
        databaseURL: "https://job-search-92565-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "job-search-92565",
        storageBucket: "job-search-92565.firebasestorage.app",
        messagingSenderId: "202940543641",
        appId: "1:202940543641:web:7f8802aa7a08704540be08",
        measurementId: "G-676RGLS7TW"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();
    let jobs = [];
    let userUID = null;
    let editingID = null;

    window.login = () => signInWithPopup(auth, provider).catch(e => alert(e.message));
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        const mainApp = document.getElementById('mainApp');
        if (user) {
            userUID = user.uid;
            mainApp.style.opacity = "1";
            mainApp.style.pointerEvents = "auto";
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
            document.getElementById('userStatus').innerText = "Strategic Sync: " + user.email;
            onValue(ref(db, `users/${userUID}/jobs`), (snapshot) => {
                const data = snapshot.val();
                jobs = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
                renderUI();
            });
        } else {
            userUID = null;
            mainApp.style.opacity = "0.4";
            mainApp.style.pointerEvents = "none";
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('userStatus').innerText = "Please login to start strategy.";
            jobs = []; renderUI();
        }
    });

    window.addJob = () => {
        const company = document.getElementById('company').value;
        const role = document.getElementById('role').value;
        if (company && role) {
            const save = (resumeBase64 = "") => {
                push(ref(db, `users/${userUID}/jobs`), {
                    company, role,
                    liMode: document.getElementById('liMode').value,
                    recruiter: document.getElementById('recruiter').value,
                    matchScore: parseInt(document.getElementById('matchScore').value),
                    date: document.getElementById('dateApplied').value || new Date().toISOString().split('T')[0],
                    interviewDate: document.getElementById('interviewDate').value || "",
                    notes: document.getElementById('notes').value,
                    remarks: document.getElementById('remarks').value,
                    status: "Applied",
                    resume: resumeBase64,
                    lastUpdated: new Date().toLocaleString()
                });
                resetForm();
            };
            const file = document.getElementById('resumeFile').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => save(e.target.result);
                reader.readAsDataURL(file);
            } else { save(); }
        } else { alert("Company and Role required!"); }
    };

    window.editJob = (id) => {
        const j = jobs.find(job => job.id === id);
        editingID = id;
        document.getElementById('company').value = j.company;
        document.getElementById('role').value = j.role;
        document.getElementById('liMode').value = j.liMode || "Manual";
        document.getElementById('recruiter').value = j.recruiter || "";
        document.getElementById('matchScore').value = j.matchScore || 70;
        document.querySelector('output').innerText = (j.matchScore || 70) + "%";
        document.getElementById('dateApplied').value = j.date;
        document.getElementById('interviewDate').value = j.interviewDate || "";
        document.getElementById('notes').value = j.notes || "";
        document.getElementById('remarks').value = j.remarks || "";
        
        document.getElementById('addBtn').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'block';
        document.getElementById('cancelBtn').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.submitUpdate = () => {
        const updateData = {
            company: document.getElementById('company').value,
            role: document.getElementById('role').value,
            liMode: document.getElementById('liMode').value,
            recruiter: document.getElementById('recruiter').value,
            matchScore: parseInt(document.getElementById('matchScore').value),
            date: document.getElementById('dateApplied').value,
            interviewDate: document.getElementById('interviewDate').value,
            notes: document.getElementById('notes').value,
            remarks: document.getElementById('remarks').value,
            lastUpdated: new Date().toLocaleString()
        };
        update(ref(db, `users/${userUID}/jobs/${editingID}`), updateData);
        resetForm();
    };

    window.resetForm = () => {
        editingID = null;
        document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        document.getElementById('addBtn').style.display = 'block';
        document.getElementById('updateBtn').style.display = 'none';
        document.getElementById('cancelBtn').style.display = 'none';
    };

    window.updateStatus = (id, newStatus) => {
        update(ref(db, `users/${userUID}/jobs/${id}`), { status: newStatus, lastUpdated: new Date().toLocaleString() });
        if(newStatus === "Offer") confetti({ particleCount: 150, spread: 70 });
    };

    window.deleteJob = (id) => { if(confirm("Delete entry?")) remove(ref(db, `users/${userUID}/jobs/${id}`)); };

    window.exportToCSV = () => {
        let csv = "Date,Company,Role,Match%,Type,Recruiter,Remarks\n";
        jobs.forEach(j => csv += `${j.date},${j.company},${j.role},${j.matchScore}%,${j.liMode},${j.recruiter},"${(j.remarks||'').replace(/"/g,'')}"\n`);
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'})); a.download = 'Strategy_Report.csv'; a.click();
    };

    window.renderUI = () => {
        const list = document.getElementById('jobList');
        const filter = document.getElementById('filterStatus').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        list.innerHTML = '';
        let stats = { Applied: 0, Interviewing: 0, Offer: 0, totalMatch: 0, countMatch: 0 };

        jobs.filter(j => {
            const mS = j.company.toLowerCase().includes(search) || j.role.toLowerCase().includes(search) || (j.recruiter||'').toLowerCase().includes(search);
            let mF = (filter === "Active") ? j.status !== "Rejected" : (filter === "All") ? true : (j.status === "Rejected");
            return mS && mF;
        }).forEach(j => {
            if(stats.hasOwnProperty(j.status)) stats[j.status]++;
            if(j.matchScore) { stats.totalMatch += j.matchScore; stats.countMatch++; }
            
            const scoreColor = j.matchScore > 85 ? '#28a745' : j.matchScore > 65 ? '#ffc107' : '#dc3545';
            const intDate = j.interviewDate ? new Date(j.interviewDate).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit'}) : 'None';

            list.innerHTML += `<tr>
                <td>${j.date}</td>
                <td><strong>${j.company}</strong><br><small>${j.liMode}</small></td>
                <td>${j.role}<br><span class="li-badge">${j.recruiter || 'No Contact'}</span></td>
                <td><span class="score-pill" style="background:${scoreColor}">${j.matchScore}%</span></td>
                <td>
                    <select onchange="updateStatus('${j.id}', this.value)" style="border:none; background:transparent; font-weight:bold;">
                        <option value="Applied" ${j.status==='Applied'?'selected':''}>Applied</option>
                        <option value="Interviewing" ${j.status==='Interviewing'?'selected':''}>Interviewing</option>
                        <option value="Offer" ${j.status==='Offer'?'selected':''}>Offer</option>
                        <option value="Rejected" ${j.status==='Rejected'?'selected':''}>Rejected</option>
                    </select>
                </td>
                <td><small>Int: ${intDate}</small><br><small>${(j.remarks||'').substring(0,30)}...</small></td>
                <td>
                    <button class="delete-btn" onclick="editJob('${j.id}')">✏️</button>
                    <button class="delete-btn" onclick="deleteJob('${j.id}')">🗑️</button>
                </td>
            </tr>`;
        });
        document.getElementById('countApplied').innerText = stats.Applied;
        document.getElementById('countInterviewing').innerText = stats.Interviewing;
        document.getElementById('countOffer').innerText = stats.Offer;
        document.getElementById('avgMatch').innerText = (stats.countMatch > 0 ? Math.round(stats.totalMatch/stats.countMatch) : 0) + "%";
    };

    window.toggleDarkMode = () => {
        const isDark = document.body.classList.toggle('dark-theme');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    };
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-theme');
</script>
</body>
</html>
